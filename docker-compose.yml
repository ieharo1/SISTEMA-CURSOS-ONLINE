version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=local
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=lms_demo02
      - DB_USERNAME=root
      - DB_PASSWORD=root123
    depends_on:
      - mysql
    networks:
      - lms-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - lms-network

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root123
      - MYSQL_DATABASE=lms_demo02
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - lms-network

volumes:
  mysql-data:

networks:
  lms-network:
    driver: bridge